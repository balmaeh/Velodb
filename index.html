<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VeloDB 1.2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <h1>VELO<span style="color:var(--text)">DB</span></h1>
      <div><span>v1.2 · Bike Management</span></div>
    </div>
    <div class="nav-wrap">
      <div class="nav-label">Navigation</div>
      <div class="nav-item active" onclick="navigate('overview')" data-view="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Übersicht
      </div>
      <div class="nav-item" onclick="navigate('compare')" data-view="compare">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>Vergleich
      </div>
      <div class="nav-item" onclick="navigate('gallery')" data-view="gallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>Galerie
      </div>
      <div class="nav-divider"></div>
      <div class="nav-label">Meine Bikes</div>
      <div id="bike-links"></div>
      <div class="nav-divider"></div>
      <div class="nav-label">Profil</div>
      <div class="nav-item" onclick="navigate('personal')" data-view="personal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Persönliches
      </div>
      <div class="nav-divider"></div>
      <div class="nav-label">Daten</div>
      <div class="nav-item" onclick="exportJson()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export JSON
      </div>
      <div class="nav-item" onclick="document.getElementById('file-json').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import JSON
      </div>
    </div>
  </nav>
  <main id="main"><div id="view"></div></main>
</div>
<div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt=""></div>
<div id="save-banner">
  <h4>&#128190; Speichern?</h4>
  <p id="sb-info">Ein Feld wurde verändert.</p>
  <div class="sb-btns">
    <button class="btn btn-primary btn-sm" onclick="doSave()">Speichern</button>
    <button class="btn btn-secondary btn-sm" onclick="hideBanner()">Später</button>
  </div>
</div>
<div id="toast"></div>
<input type="file" id="file-json" accept=".json" style="display:none" onchange="importJson(event)">
<input type="file" id="file-photo" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
<script src="js/storage.js"></script>
<script src="js/render.js"></script>
<script src="js/handlers.js"></script>
<script>
initApp();
</script>
</body>
</html>
