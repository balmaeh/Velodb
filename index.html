<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VeloDB 1.2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0f;--surface:#161618;--surface2:#1e1e21;--border:#2c2c30;--accent:#e8611a;--accent-dim:rgba(232,97,26,0.13);--text:#f0f0f0;--muted:#888;--r:10px}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{display:flex;min-height:100vh}
#sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:2px;color:var(--accent)}
.sidebar-logo span{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.nav-wrap{flex:1;padding:8px 0;overflow-y:auto}
.nav-label{padding:10px 20px 4px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 20px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
.nav-item.bike-link{font-size:12px;padding:7px 20px 7px 28px}
.nav-item.bike-link .bike-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-divider{height:1px;background:var(--border);margin:6px 16px}
#main{margin-left:230px;flex:1;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700}
.topbar-actions{display:flex;gap:8px}
.content{padding:22px 26px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:7px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#d4561a}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--muted)}.btn-ghost:hover{color:var(--text)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.filter-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.filter-tabs{display:flex;gap:3px;padding:3px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.filter-tab{padding:5px 15px;border-radius:5px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;user-select:none}
.filter-tab.active{background:var(--accent);color:#fff}
.filter-tab:hover:not(.active){color:var(--text)}
.bikes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.bike-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s}
.bike-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.bike-card-photo{height:150px;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bike-card-photo img{width:100%;height:100%;object-fit:cover}
.no-photo{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:12px}
.bike-status-badge{position:absolute;top:8px;right:8px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.status-aktiv{background:rgba(34,197,94,.2);color:#22c55e}
.status-ausgemustert{background:rgba(239,68,68,.15);color:#ef4444}
.bike-card-body{padding:13px}
.bike-card-brand{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.bike-card-model{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;margin-bottom:7px;line-height:1.2}
.bike-meta-row{display:flex;gap:8px;flex-wrap:wrap}
.bike-meta-chip{font-size:11px;color:var(--muted)}
.bike-hero{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 26px;display:flex;align-items:flex-start;gap:18px}
.hero-photo{width:100px;height:68px;border-radius:8px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;overflow:hidden;cursor:pointer}
.hero-photo img{width:100%;height:100%;object-fit:cover}
.hero-info{flex:1}
.hero-brand{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.hero-model{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1.1;margin:2px 0 8px}
.hero-chips{display:flex;gap:7px;flex-wrap:wrap}
.hero-chip{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 9px;border-radius:20px}
.detail-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 26px;background:var(--surface);position:sticky;top:49px;z-index:80;overflow-x:auto}
.detail-tab{padding:12px 17px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.detail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.detail-tab:hover:not(.active){color:var(--text)}
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px}
/* DRAG */
.drag-handle{display:flex;align-items:center;justify-content:center;width:28px;flex-shrink:0;cursor:grab;color:var(--border);touch-action:none;user-select:none;transition:color .15s}
.drag-handle:hover{color:var(--muted)}.drag-handle:active{cursor:grabbing;color:var(--accent)}
.dnd-dragging{opacity:.15!important;pointer-events:none}
.dnd-over{outline:2px dashed var(--accent)!important;background:var(--accent-dim)!important}
/* GROUP CARDS */
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:9px}
.group-title-row{display:flex;align-items:center;background:var(--surface2);border-bottom:1px solid var(--border)}
.group-title-text{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:9px 12px 9px 0;flex:1}
/* COMP ROWS */
.comp-row{display:grid;grid-template-columns:28px 115px 1fr auto auto auto;align-items:center;gap:7px;padding:8px 13px 8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.comp-row:hover{background:rgba(255,255,255,.03)}
.comp-row:last-child{border-bottom:none}
.comp-row.dnd-over{background:var(--accent-dim)!important}
.comp-row.not-available{opacity:.45}
.comp-name{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.comp-val{font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp-val.empty{color:var(--muted);font-style:italic}
.comp-val.na{color:var(--muted);font-style:italic}
.comp-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.hist-badge{font-size:10px;font-weight:600;background:var(--accent-dim);color:var(--accent);padding:2px 6px;border-radius:10px;white-space:nowrap}
.na-badge{font-size:10px;font-weight:600;background:rgba(136,136,136,.15);color:var(--muted);padding:2px 7px;border-radius:10px;white-space:nowrap}
/* SETTING ROWS */
.setting-row{display:flex;align-items:center;padding:10px 13px 10px 0;border-bottom:1px solid var(--border);gap:7px;transition:background .1s}
.setting-row:last-child{border-bottom:none}
.setting-row.dnd-over{background:var(--accent-dim)!important}
.setting-label{font-size:11.5px;font-weight:600;color:var(--muted);min-width:155px;text-transform:uppercase;letter-spacing:.4px}
.setting-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;flex:1;cursor:pointer}
.setting-val.empty{font-family:'Barlow',sans-serif;color:var(--muted);font-size:12px;font-style:italic;font-weight:400}
.setting-actions{display:flex;gap:4px;align-items:center}
/* FORM */
.form-group{margin-bottom:13px}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
.form-input{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color .15s;resize:vertical}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:13px}
/* checkbox */
.checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:8px;margin-bottom:14px;cursor:pointer;user-select:none}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:#ef4444;cursor:pointer}
.checkbox-row label{font-size:13px;color:#ef4444;cursor:pointer;font-weight:500}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column}
.modal-header{padding:15px 22px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
.modal-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:13px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.cur-val-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.cur-val-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.cur-val-main{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:5px}
.cur-val-main.empty{color:var(--muted);font-style:italic;font-size:13px;font-weight:400}
.cur-val-meta{display:flex;gap:12px;flex-wrap:wrap}
.cur-val-meta span{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
/* comp ref box in settings modal */
.comp-ref-box{background:rgba(232,97,26,.07);border:1px solid rgba(232,97,26,.2);border-radius:7px;padding:9px 13px;margin-bottom:12px}
.comp-ref-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.comp-ref-val{font-size:12.5px;color:var(--text);font-weight:500;line-height:1.4}
.comp-ref-val.empty-ref{color:var(--muted);font-style:italic}
/* HISTORY */
.hist-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 0 5px;font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);user-select:none;border-top:1px solid var(--border);margin-top:6px;transition:color .15s}
.hist-toggle:hover{color:var(--text)}
.hist-icon{font-size:9px;display:inline-block;transition:transform .2s}
.hist-entry{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px;position:relative}
.hist-entry.current{border-color:var(--accent);background:var(--accent-dim)}
.hist-entry.current::after{content:'AKTUELL';position:absolute;top:7px;right:9px;font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--accent)}
.hist-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:3px}
.hist-val{font-size:12.5px;margin-bottom:4px;line-height:1.4}
.hist-meta{display:flex;gap:8px;flex-wrap:wrap}
.hist-meta span{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.hist-kompsnap{font-size:11px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);line-height:1.4}
.hist-kompsnap-label{font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
/* TODO */
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.todo-check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo-check.done{background:var(--accent);border-color:var(--accent)}
.todo-text{font-size:13px;flex:1}
.todo-text.done{text-decoration:line-through;color:var(--muted)}
/* COMPARE */
.compare-grid{display:grid;grid-template-columns:auto 1fr 1fr;width:100%;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cmp-cell{background:var(--surface);padding:8px 12px;font-size:12px;line-height:1.3}
.cmp-cell.header{background:var(--surface2);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:center;padding:13px}
.cmp-cell.row-label{background:var(--surface2);font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.cmp-diff{color:var(--accent)}

/* COMPARE COLOR GROUPS */
.cmp-g0{background:var(--surface)}
.cmp-g1{background:rgba(59,130,246,.12);color:#93c5fd}
.cmp-g2{background:rgba(34,197,94,.12);color:#86efac}
.cmp-g3{background:rgba(251,191,36,.12);color:#fcd34d}
.cmp-g4{background:rgba(168,85,247,.12);color:#c4b5fd}
.cmp-g5{background:rgba(236,72,153,.12);color:#f9a8d4}
.cmp-g-unique{background:var(--surface)}

.cmp-section{background:rgba(232,97,26,.08);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:5px 12px}
/* AUTOSAVE */
#save-banner{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:14px 17px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:500;min-width:265px;display:none;animation:slideup .3s ease}
@keyframes slideup{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
#save-banner h4{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:3px}
#save-banner p{font-size:11px;color:var(--muted);margin-bottom:10px}
#save-banner .sb-btns{display:flex;gap:7px}
.rich-toolbar{display:flex;gap:3px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:var(--r) var(--r) 0 0;flex-wrap:wrap}
.rich-btn{padding:3px 9px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all .1s}
.rich-btn:hover{background:var(--border);color:var(--text)}
#personal-editor{min-height:300px;background:var(--surface2);border:1px solid var(--border);border-radius:0 0 var(--r) var(--r);padding:15px;font-size:14px;line-height:1.8;outline:none}
#personal-editor:focus{border-color:var(--accent)}
.photo-upload-area{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;color:var(--muted);font-size:12px;transition:border-color .15s}
.photo-upload-area:hover{border-color:var(--accent);color:var(--accent)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-top:10px}
.photo-thumb{aspect-ratio:4/3;border-radius:6px;overflow:hidden;position:relative;background:var(--surface2)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,.75);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:10px;font-weight:600}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;transition:color .15s;user-select:none}
.back-btn:hover{color:var(--text)}
.empty-state{text-align:center;padding:55px 20px;color:var(--muted)}
.empty-state h3{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;margin:13px 0 7px}
.empty-state p{font-size:13px}
hr.div{border:none;border-top:1px solid var(--border);margin:14px 0}
/* EDIT MODE */
.edit-mode-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(232,97,26,.1);border:1px solid rgba(232,97,26,.3);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--accent)}
.field-edit-row{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.field-edit-row:last-child{border-bottom:none}
.field-edit-input{background:var(--surface2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:4px 8px;outline:none;min-width:130px;flex:1}
.field-edit-unit{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:12px;padding:4px 8px;outline:none;width:70px}
.field-edit-unit:focus{border-color:var(--accent)}
.edit-btn{padding:4px 10px;font-size:12px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.edit-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
/* GEO */
.geo-row{display:flex;align-items:center;padding:10px 13px 10px 0;border-bottom:1px solid var(--border);gap:7px;transition:background .1s}
.geo-row:last-child{border-bottom:none}
.geo-label{font-size:11.5px;font-weight:600;color:var(--muted);min-width:155px;text-transform:uppercase;letter-spacing:.4px}
.geo-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;flex:1;cursor:pointer}
.geo-val.empty{font-family:'Barlow',sans-serif;color:var(--muted);font-size:12px;font-style:italic;font-weight:400}
/* COLLAPSIBLE ZEITSTRAHL */
.collapse-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 0 8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);user-select:none;border-top:1px solid var(--border);margin-top:16px;transition:color .15s}
.collapse-header:hover{color:var(--text)}
.collapse-icon{font-size:10px;display:inline-block;transition:transform .2s}
.collapse-icon.open{transform:rotate(90deg)}

#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:7px 17px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
@media(max-width:768px){
  #sidebar{width:100%;height:56px;bottom:0;top:auto;flex-direction:row;border-right:none;border-top:1px solid var(--border);padding:0}
  .sidebar-logo,.nav-label,.nav-divider,.bike-link{display:none}
  .nav-wrap{display:flex;flex-direction:row;width:100%;padding:0;justify-content:space-around}
  .nav-item{flex-direction:column;gap:3px;padding:7px 10px;font-size:10px;border-left:none;border-top:3px solid transparent;flex:1;justify-content:center;text-align:center}
  .nav-item.active{border-top-color:var(--accent)}
  #main{margin-left:0;padding-bottom:56px}

<script>
// ================================================================
// DEFAULT DEFINITIONS
// ================================================================
function defaultGeoDefs(){
  return [
    {id:'g01',label:'Reach',unit:'mm',group:'Geometrie'},
    {id:'g02',label:'Stack',unit:'mm',group:'Geometrie'},
    {id:'g03',label:'Effective TT',unit:'mm',group:'Geometrie'},
    {id:'g04',label:'Head Tube Angle',unit:'°',group:'Geometrie'},
    {id:'g05',label:'Seat Tube Angle',unit:'°',group:'Geometrie'},
    {id:'g06',label:'Chainstay',unit:'mm',group:'Geometrie'},
    {id:'g07',label:'Wheelbase',unit:'mm',group:'Geometrie'},
    {id:'g08',label:'BB Drop',unit:'mm',group:'Geometrie'},
    {id:'g09',label:'Lenkerlänge',unit:'mm',group:'Cockpit'},
    {id:'g10',label:'Vorbaulänge',unit:'mm',group:'Cockpit'},
    {id:'g11',label:'Sattelrohrlänge',unit:'mm',group:'Rahmen'},
    {id:'g12',label:'Steuerrohr',unit:'mm',group:'Rahmen'},
  ];
}
function ensureGeoDefs(){
  if(!state.geoDefs||!state.geoDefs.length)state.geoDefs=defaultGeoDefs();
}
function ensureBikeGeo(b){
  ensureGeoDefs();
  if(!b.geometry)b.geometry=[];
  // add missing defs
  state.geoDefs.forEach(def=>{
    if(!b.geometry.find(g=>g.defId===def.id)){
      b.geometry.push({defId:def.id,history:[]});
    }
  });
  // remove orphans
  b.geometry=b.geometry.filter(g=>state.geoDefs.find(d=>d.id===g.defId));
}

// ================================================================
// CONSTANTS
// ================================================================
const COMP_GROUPS=[
  {group:'Rahmen & Federung',items:['Rahmen','Gabel','Dämpfer']},
  {group:'Antrieb',items:['Kurbelgarnitur','Innenlager','Pedale','Kettenblatt','Schaltwerk','Kassette','Schalthebel','Kettenführung','Kette']},
  {group:'Bremsen',items:['Bremsen vorne','Bremsen hinten','Bremsscheibe vorne','Bremsscheibe hinten','Bremsgriff vorne','Bremsgriff hinten','Bremsbeläge vorne','Bremsbeläge hinten','Bremsschläuche']},
  {group:'Räder',items:['Laufrad vorne','Laufrad hinten','Reifen vorne','Reifen hinten','Ventil/Schlauch vorne','Ventil/Schlauch hinten','Mudguard vorne','Mudguard hinten']},
  {group:'Cockpit',items:['Steuersatz','Vorbau','Lenker','Griffe','Zubehör 1','Zubehör 2']},
  {group:'Sattel',items:['Sattel','Sattelstütze','Sattelklemme']},
  {group:'E-Bike',items:['Motor','Display','Akku','Ladegerät']}
];

// For each setting label, list which component names to show as reference
const SETTING_COMP_MAP={
  'Gabel Luftdruck':['Gabel'],
  'Gabel Tokens':['Gabel'],
  'Gabel Zugstufe':['Gabel'],
  'Gabel Druckstufe':['Gabel'],
  'Gabel Sag':['Gabel'],
  'Dämpfer Luftdruck':['Dämpfer'],
  'Dämpfer Tokens':['Dämpfer'],
  'Dämpfer Zugstufe':['Dämpfer'],
  'Dämpfer Druckstufe':['Dämpfer'],
  'Dämpfer Sag':['Dämpfer'],
  'Reifendruck vorne':['Reifen vorne','Ventil/Schlauch vorne'],
  'Reifendruck hinten':['Reifen hinten','Ventil/Schlauch hinten']
};

const STD_SETTINGS=[
  {label:'Gabel Luftdruck',unit:'PSI',group:'Gabel'},
  {label:'Gabel Tokens',unit:'Stk.',group:'Gabel'},
  {label:'Gabel Zugstufe',unit:'Klicks',group:'Gabel'},
  {label:'Gabel Druckstufe',unit:'Klicks',group:'Gabel'},
  {label:'Gabel Sag',unit:'mm',group:'Gabel'},
  {label:'Dämpfer Luftdruck',unit:'PSI',group:'Dämpfer'},
  {label:'Dämpfer Tokens',unit:'Stk.',group:'Dämpfer'},
  {label:'Dämpfer Zugstufe',unit:'Klicks',group:'Dämpfer'},
  {label:'Dämpfer Druckstufe',unit:'Klicks',group:'Dämpfer'},
  {label:'Dämpfer Sag',unit:'mm',group:'Dämpfer'},
  {label:'Reifendruck vorne',unit:'Bar',group:'Reifen'},
  {label:'Reifendruck hinten',unit:'Bar',group:'Reifen'}
];

function newBike(o={}){
  return{id:uid(),status:'aktiv',marke:'',modell:'',typ:'',jahr:'',farbe:'',groesse:'',bezug:'',preis:'',federweg:'',gewichtGewogen:'',fotos:[],
    aktuellerZustand:'',bemerkungen:'',
    components:COMP_GROUPS.flatMap(g=>g.items.map(name=>({group:g.group,name,history:[],notVorhanden:false}))),
    settings:STD_SETTINGS.map(s=>({...s,isStandard:true,history:[]})),
    geometry:[],todos:[],...o};
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cur(h){return h&&h.length?h[h.length-1]:null}
function fmtDate(d){try{return d?new Date(d).toLocaleDateString('de-CH'):''}catch{return d||''}}
function today(){return new Date().toISOString().split('T')[0]}
function vv(id){const el=document.getElementById(id);return el?el.value:''}
function lastPhoto(b){
  if(!b.fotos||!b.fotos.length)return null;
  const f=b.fotos[b.fotos.length-1];
  return typeof f==='string'?f:f.data;
}
function lastPhotoForDate(b,datumStr){
  // newest photo whose datum <= datumStr, or first photo if none dated
  if(!b.fotos||!b.fotos.length)return null;
  const candidates=b.fotos.filter(f=>{
    const d=typeof f==='string'?null:f.datum;
    return !d||d<=datumStr;
  });
  if(!candidates.length)return null;
  const f=candidates[candidates.length-1];
  return typeof f==='string'?f:f.data;
}
function photoDate(f){return typeof f==='string'?null:f.datum;}
function compGroupOrder(comps){const seen=new Set(),o=[];comps.forEach(c=>{if(!seen.has(c.group)){seen.add(c.group);o.push(c.group);}});return o}
function setGroupOrder(sets){const seen=new Set(),o=[];sets.forEach(s=>{const g=s.group||'Sonstige';if(!seen.has(g)){seen.add(g);o.push(g);}});return o}

// ================================================================
// DND — group names in arrays to avoid HTML escaping issues
// ================================================================
let dndCompGrpNames=[];
let dndSetGrpNames=[];

// ================================================================
// STATE
// ================================================================
const KEY='velodb_v6';
let state=(()=>{try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch{}return null;})();
if(!state){
  state={version:12,personalInfo:'',bikes:[],geoDefs:defaultGeoDefs()};
  localStorage.setItem(KEY,JSON.stringify(state));
}
// migrate old data
ensureGeoDefs();
state.bikes.forEach(b=>{
  b.components.forEach(c=>{if(c.notVorhanden===undefined)c.notVorhanden=false;});
  b.fotos=(b.fotos||[]).map(f=>typeof f==='string'?{data:f,datum:today()}:f);
  if(b.aktuelleProbleme!==undefined&&b.aktuellerZustand===undefined){b.aktuellerZustand=b.aktuelleProbleme;delete b.aktuelleProbleme;}
  if(!b.geometry)b.geometry=[];
  ensureBikeGeo(b);
});

// ================================================================
// PERSISTENCE / AUTOSAVE
// ================================================================
let dirtyField=null,dirtyTimer=null;
function saveState(c=true){localStorage.setItem(KEY,JSON.stringify(state));dirtyField=null;if(dirtyTimer)clearTimeout(dirtyTimer);hideBanner();if(c)showToast('Gespeichert ✓')}
function markDirty(l){dirtyField=l;if(dirtyTimer)clearTimeout(dirtyTimer);dirtyTimer=setTimeout(()=>{document.getElementById('sb-info').textContent='"'+l+'" wurde verändert.';document.getElementById('save-banner').style.display='block';},3*60*1000)}
function hideBanner(){document.getElementById('save-banner').style.display='none'}
function doSave(){saveState(true)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2200)}

// ================================================================
// DRAG & DROP
// ================================================================
let dnd=null;
const HSVG='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>';

function startDrag(e,type,idx,grpIdx){
  e.preventDefault();e.stopPropagation();
  const handle=e.currentTarget;
  const row=handle.closest('[data-dnd-type]');
  if(!row)return;
  try{handle.setPointerCapture(e.pointerId);}catch(_){}
  const rect=row.getBoundingClientRect();
  const ghost=row.cloneNode(true);
  ghost.id='dnd-ghost';
  Object.assign(ghost.style,{position:'fixed',top:rect.top+'px',left:rect.left+'px',width:rect.width+'px',zIndex:'9999',pointerEvents:'none',opacity:'.88',boxShadow:'0 8px 28px rgba(0,0,0,.7)',background:'var(--surface2)',border:'1.5px solid var(--accent)',borderRadius:'8px'});
  document.body.appendChild(ghost);
  row.classList.add('dnd-dragging');
  dnd={type,fromIdx:idx,toIdx:idx,grpIdx,row,handle,ghostBaseTop:rect.top,startY:e.clientY};
  handle.addEventListener('pointermove',dndMove,{passive:false});
  handle.addEventListener('pointerup',dndEnd);
  handle.addEventListener('pointercancel',dndEnd);
}
function dndMove(e){
  if(!dnd)return;e.preventDefault();
  const g=document.getElementById('dnd-ghost');
  if(g)g.style.top=(dnd.ghostBaseTop+(e.clientY-dnd.startY))+'px';
  if(g)g.style.visibility='hidden';
  const els=document.elementsFromPoint(e.clientX,e.clientY);
  if(g)g.style.visibility='';
  document.querySelectorAll('.dnd-over').forEach(el=>el.classList.remove('dnd-over'));
  for(const el of els){
    const t=el.closest('[data-dnd-type="'+dnd.type+'"]');
    if(t&&t!==dnd.row){t.classList.add('dnd-over');dnd.toIdx=parseInt(t.dataset.dndIdx);break;}
  }
}
function dndEnd(e){
  if(!dnd)return;
  dnd.handle.removeEventListener('pointermove',dndMove);
  dnd.handle.removeEventListener('pointerup',dndEnd);
  dnd.handle.removeEventListener('pointercancel',dndEnd);
  const g=document.getElementById('dnd-ghost');if(g)g.remove();
  dnd.row.classList.remove('dnd-dragging');
  document.querySelectorAll('.dnd-over').forEach(el=>el.classList.remove('dnd-over'));
  if(dnd.toIdx!==dnd.fromIdx)doReorder(dnd.type,dnd.fromIdx,dnd.toIdx,dnd.grpIdx);
  dnd=null;
}
function doReorder(type,from,to,grpIdx){
  const b=getBike(bikeId);
  if(type==='comp-group'){
    const gs=[...dndCompGrpNames];const[g]=gs.splice(from,1);gs.splice(to,0,g);
    const old=[...b.components];b.components=gs.flatMap(gn=>old.filter(c=>c.group===gn));
    markDirty('Gruppen');switchTab('komponenten');
  }else if(type==='comp'){
    const grpName=dndCompGrpNames[grpIdx];if(!grpName)return;
    const old=[...b.components];const gc=old.filter(c=>c.group===grpName);
    const[item]=gc.splice(from,1);gc.splice(to,0,item);
    const gs=compGroupOrder(old);b.components=gs.flatMap(g=>g===grpName?gc:old.filter(c=>c.group===g));
    markDirty('Komponenten');switchTab('komponenten');
  }else if(type==='setting-group'){
    const gs=[...dndSetGrpNames];const[g]=gs.splice(from,1);gs.splice(to,0,g);
    const old=[...b.settings];b.settings=gs.flatMap(gn=>old.filter(s=>(s.group||'Sonstige')===gn));
    markDirty('Einstellungen');switchTab('einstellungen');
  }else if(type==='setting'){
    const grpName=dndSetGrpNames[grpIdx];if(!grpName)return;
    const old=[...b.settings];const gc=old.filter(s=>(s.group||'Sonstige')===grpName);
    const[item]=gc.splice(from,1);gc.splice(to,0,item);
    const gs=setGroupOrder(old);b.settings=gs.flatMap(g=>g===grpName?gc:old.filter(s=>(s.group||'Sonstige')===g));
    markDirty('Einstellungen');switchTab('einstellungen');
  }
}

// ================================================================
// EDIT MODE
// ================================================================
let editMode=null; // 'komponenten' | 'einstellungen' | 'geometrie'
function toggleEditMode(t){editMode=(editMode===t?null:t);switchTab(t);}

// ---- Global field rename ----
function renameCompField(oldName,newName){
  if(!newName||newName===oldName)return;
  state.bikes.forEach(b=>{
    b.components.forEach(c=>{
      if(c.name===oldName){c.name=newName;}
    });
  });
  // update COMP_GROUPS in memory
  COMP_GROUPS.forEach(g=>{const i=g.items.indexOf(oldName);if(i>=0)g.items[i]=newName;});
  markDirty('Felder');switchTab('komponenten');
}
function renameSetField(oldLabel,newLabel){
  if(!newLabel||newLabel===oldLabel)return;
  // update SETTING_COMP_MAP
  if(SETTING_COMP_MAP[oldLabel]){SETTING_COMP_MAP[newLabel]=SETTING_COMP_MAP[oldLabel];delete SETTING_COMP_MAP[oldLabel];}
  state.bikes.forEach(b=>{
    b.settings.forEach(s=>{if(s.label===oldLabel)s.label=newLabel;});
  });
  markDirty('Felder');switchTab('einstellungen');
}
function renameGeoField(defId,newLabel,newUnit){
  const def=state.geoDefs.find(d=>d.id===defId);if(!def)return;
  def.label=newLabel;def.unit=newUnit;
  markDirty('Felder');switchTab('geometrie');
}

// ---- Delete with confirmation ----
function deleteCompField(name){
  const count=state.bikes.reduce((a,b)=>{const c=b.components.find(c=>c.name===name);return a+(c&&c.history.length?1:0);},0);
  const msg=count>0?`Es existieren Daten für ${count} Bike(s) im Feld "${name}".\nFeld und alle Daten wirklich löschen?`:`Feld "${name}" löschen?`;
  if(!confirm(msg))return;
  COMP_GROUPS.forEach(g=>{g.items=g.items.filter(i=>i!==name);});
  state.bikes.forEach(b=>{b.components=b.components.filter(c=>c.name!==name);});
  markDirty('Felder');switchTab('komponenten');
}
function deleteSetField(label){
  const count=state.bikes.reduce((a,b)=>{const s=b.settings.find(s=>s.label===label);return a+(s&&s.history.length?1:0);},0);
  const msg=count>0?`Es existieren Daten für ${count} Bike(s) im Feld "${label}".\nFeld und alle Daten wirklich löschen?`:`Feld "${label}" löschen?`;
  if(!confirm(msg))return;
  state.bikes.forEach(b=>{b.settings=b.settings.filter(s=>s.label!==label);});
  markDirty('Felder');switchTab('einstellungen');
}
function deleteGeoField(defId){
  const def=state.geoDefs.find(d=>d.id===defId);if(!def)return;
  const count=state.bikes.reduce((a,b)=>{const g=b.geometry.find(g=>g.defId===defId);return a+(g&&g.history.length?1:0);},0);
  const msg=count>0?`Es existieren Daten für ${count} Bike(s) im Feld "${def.label}".\nFeld und alle Daten wirklich löschen?`:`Feld "${def.label}" löschen?`;
  if(!confirm(msg))return;
  state.geoDefs=state.geoDefs.filter(d=>d.id!==defId);
  state.bikes.forEach(b=>{b.geometry=b.geometry.filter(g=>g.defId!==defId);});
  markDirty('Felder');switchTab('geometrie');
}

// ---- Add field ----
function addCompField(group){
  const label=prompt('Name des neuen Feldes:');if(!label||!label.trim())return;
  const g=COMP_GROUPS.find(g=>g.group===group);if(!g)return;
  g.items.push(label.trim());
  state.bikes.forEach(b=>{b.components.push({group,name:label.trim(),history:[],notVorhanden:false});});
  markDirty('Felder');switchTab('komponenten');
}
function addSetField(){
  const label=prompt('Name des neuen Feldes:');if(!label||!label.trim())return;
  const unit=prompt('Einheit (optional):')||'';
  const group=prompt('Gruppe (z.B. Gabel, Reifen, Eigene Felder):')||'Eigene Felder';
  state.bikes.forEach(b=>{b.settings.push({label:label.trim(),unit,group,isStandard:false,history:[]});});
  markDirty('Felder');switchTab('einstellungen');
}
function addGeoField(){
  const label=prompt('Name des neuen Feldes:');if(!label||!label.trim())return;
  const unit=prompt('Einheit (optional, z.B. mm, °):')||'';
  const group=prompt('Gruppe (z.B. Geometrie, Cockpit, Rahmen):')||'Geometrie';
  const id='g'+uid();
  state.geoDefs.push({id,label:label.trim(),unit,group});
  state.bikes.forEach(b=>{b.geometry.push({defId:id,history:[]});});
  markDirty('Felder');switchTab('geometrie');
}

// ================================================================
// ROUTER
// ================================================================
let view='overview',bikeId=null,tab='info',filter='aktiv',cmpIds=['',''],cmpSnaps=['',''];
function navigate(v,id=null,t='info'){
  view=v;bikeId=id;tab=t;
  document.querySelectorAll('.nav-item[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view===v));
  buildBikeLinks();render();window.scrollTo(0,0);
}
function buildBikeLinks(){
  const el=document.getElementById('bike-links');if(!el)return;
  const active=state.bikes.filter(b=>b.status==='aktiv');
  el.innerHTML=active.map(b=>`<div class="nav-item bike-link ${bikeId===b.id&&view==='bike'?'active':''}" onclick="navigate('bike','${b.id}')"><span class="bike-dot"></span>${esc(b.marke)} ${esc(b.modell)||'Unbenannt'}</div>`).join('');
}

// ================================================================
// RENDER
// ================================================================
function render(){
  const el=document.getElementById('view');
  if(view==='overview')el.innerHTML=renderOverview();
  else if(view==='bike')el.innerHTML=renderDetail();
  else if(view==='compare')el.innerHTML=renderCompare();
  else if(view==='personal')el.innerHTML=renderPersonal();
  attachListeners();
}

function renderOverview(){
  const bikes=state.bikes.filter(b=>filter==='alle'?true:b.status===filter);
  return`<div class="topbar"><div class="topbar-title">Meine Bikes</div><div class="topbar-actions"><button class="btn btn-primary btn-sm" onclick="addBike()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Neues Bike</button></div></div>
  <div class="content">
    <div class="filter-bar"><div class="filter-tabs"><div class="filter-tab ${filter==='aktiv'?'active':''}" onclick="setFilter('aktiv')">Aktiv</div><div class="filter-tab ${filter==='ausgemustert'?'active':''}" onclick="setFilter('ausgemustert')">Ausgemustert</div><div class="filter-tab ${filter==='alle'?'active':''}" onclick="setFilter('alle')">Alle (${state.bikes.length})</div></div></div>
    ${bikes.length===0?`<div class="empty-state"><h3>Keine Bikes</h3><p>Füge ein neues Bike hinzu oder ändere den Filter.</p></div>`:`<div class="bikes-grid">${bikes.map(bikeCard).join('')}</div>`}
  </div>`;
}

function bikeCard(b){
  const p=lastPhoto(b);const w=b.gewichtGewogen?(parseInt(b.gewichtGewogen)/1000).toFixed(2)+' kg':null;
  return`<div class="bike-card" onclick="navigate('bike','${b.id}')">

function renderDetail(){

  const TABS=[{id:'info',l:'Info'},{id:'komponenten',l:'Komponenten'},{id:'einstellungen',l:'Einstellungen'},{id:'geometrie',l:'Geometrie'},{id:'todos',l:`ToDo${todosOpen?` (${todosOpen})`:''}`}];

    <div style="display:flex;align-items:center;gap:13px"><div class="back-btn" onclick="navigate('overview')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>Zurück</div><div class="topbar-title">${esc(b.marke)} ${esc(b.modell)}</div></div>
    <div class="topbar-actions"><button class="btn btn-secondary btn-sm" onclick="retireBike('${b.id}')">${b.status==='aktiv'?'Ausmustern':'Reaktivieren'}</button><button class="btn btn-danger btn-sm" onclick="deleteBike('${b.id}')">Löschen</button><button class="btn btn-primary btn-sm" onclick="doSave()">Speichern</button></div>
  </div>
  <div class="bike-hero">

    <div class="hero-info"><div class="hero-brand">${esc(b.marke)}</div><div class="hero-model">${esc(b.modell)||'Unbenannt'}</div>
    <div class="hero-chips">${b.typ?`<div class="hero-chip">🏔 ${esc(b.typ)}</div>`:''} ${b.groesse?`<div class="hero-chip">📐 ${esc(b.groesse)}</div>`:''} ${b.federweg?`<div class="hero-chip">↕ ${esc(b.federweg)} mm</div>`:''} ${b.gewichtGewogen?`<div class="hero-chip">⚖ ${(parseInt(b.gewichtGewogen)/1000).toFixed(2)} kg</div>`:''} ${b.preis?`<div class="hero-chip">💰 CHF ${esc(b.preis)}</div>`:''} <div class="hero-chip" style="background:${b.status==='aktiv'?'rgba(34,197,94,.12)':'rgba(239,68,68,.1)'};color:${b.status==='aktiv'?'#22c55e':'#ef4444'}">${b.status}</div></div></div>

  <div class="content" id="tab-content">${renderTab(b)}</div>`;
}
function switchTab(t){
  tab=t;const b=getBike(bikeId);
  document.querySelectorAll('.detail-tab').forEach((el,i)=>el.classList.toggle('active',['info','komponenten','einstellungen','geometrie','todos'][i]===t));
  const tc=document.getElementById('tab-content');if(tc){tc.innerHTML=renderTab(b);attachListeners();}
}
function renderTab(b){
  if(tab==='info')return tabInfo(b);
  if(tab==='komponenten')return tabKomponenten(b);
  if(tab==='einstellungen')return tabEinstellungen(b);
  if(tab==='geometrie')return tabGeometrie(b);
  if(tab==='todos')return tabTodos(b);
  return tabInfo(b);
}

function tabInfo(b){
  const fields=[{f:'marke',l:'Marke'},{f:'modell',l:'Modell'},{f:'typ',l:'Typ',ph:'z.B. Enduro, Trail, XC...'},{f:'jahr',l:'Modelljahr'},{f:'farbe',l:'Farbe'},{f:'groesse',l:'Grösse',ph:'z.B. L, XL, 19.5"...'},{f:'federweg',l:'Federweg v/h (mm)',ph:'z.B. 160/150'},{f:'gewichtGewogen',l:'Gewicht gewogen (g)',ph:'z.B. 15470',type:'number'},{f:'bezug',l:'Bezug',ph:'Händler / Privat...'},{f:'preis',l:'Kaufpreis (CHF)'}];

      <div class="form-grid">${fields.map(({f,l,ph,type})=>`<div class="form-group"><label class="form-label">${l}</label><input class="form-input" type="${type||'text'}" value="${esc(b[f])}" data-field="${f}" data-label="${l}" placeholder="${ph||''}"></div>`).join('')}</div>

      <div class="form-group"><label class="form-label">Bemerkungen</label><textarea class="form-input" rows="3" data-field="bemerkungen" data-label="Bemerkungen">${esc(b.bemerkungen)}</textarea></div>

      ${b.fotos&&b.fotos.length?`<div class="photo-grid">${b.fotos.map((f,i)=>`<div class="photo-thumb"><img src="${typeof f==='string'?f:f.data}"><div style="position:absolute;bottom:4px;left:4px;font-size:9px;color:#fff;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px">${typeof f==='string'?'':f.datum||''}</div><div class="photo-del" onclick="delPhoto(${i})">✕</div></div>`).join('')}</div>`:`<div class="photo-upload-area" onclick="document.getElementById('file-photo').click()">Fotos hinzufügen</div>`}

}

function tabKomponenten(b){
  ensureBikeGeo(b);
  const groups={};b.components.forEach(c=>{if(!groups[c.group])groups[c.group]=[];groups[c.group].push(c);});
  const gNames=compGroupOrder(b.components);
  dndCompGrpNames=gNames;
  const totalG=b.components.filter(c=>!c.notVorhanden).map(c=>parseFloat((cur(c.history)||{}).gewicht)).filter(v=>!isNaN(v)).reduce((a,x)=>a+x,0);
  const em=editMode==='komponenten';

  const groupsHtml=gNames.map((g,gi)=>{
    const comps=groups[g]||[];
    if(em){
      return`<div class="group-card" style="margin-bottom:9px">
        <div class="group-title-row"><div class="group-title-text">${esc(g)}</div></div>
        ${comps.map((c,ci)=>{const fi=b.components.indexOf(c);return`<div class="field-edit-row">
          <input class="field-edit-input" value="${esc(c.name)}" onblur="renameCompField('${c.name.replace(/'/g,"\\'")}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
          <button class="btn btn-danger btn-sm" onclick="deleteCompField('${c.name.replace(/'/g,"\\'")}')">✕</button>
        </div>`;}).join('')}
        <div style="padding:8px 12px"><button class="btn btn-secondary btn-sm" onclick="addCompField('${g.replace(/'/g,"\\'")}')">+ Feld</button></div>
      </div>`;
    }
    return`<div class="group-card" data-dnd-type="comp-group" data-dnd-idx="${gi}">
      <div class="group-title-row"><div class="drag-handle" data-dnd-type="comp-group" data-dnd-idx="${gi}" onpointerdown="startDrag(event,'comp-group',${gi},${gi})">${HSVG}</div><div class="group-title-text">${esc(g)}</div></div>
      ${comps.map((c,ci)=>{const h=cur(c.history);const fi=b.components.indexOf(c);
        return`<div class="comp-row${c.notVorhanden?' not-available':''}" data-dnd-type="comp" data-dnd-idx="${ci}" onclick="openCompModal(${fi})">
          <div class="drag-handle" data-dnd-type="comp" data-dnd-idx="${ci}" onpointerdown="startDrag(event,'comp',${ci},${gi});event.stopPropagation()">${HSVG}</div>
          <div class="comp-name">${esc(c.name)}</div>
          <div class="comp-val ${c.notVorhanden?'na':!h?'empty':''}">${c.notVorhanden?'Nicht vorhanden':h?esc(h.wert):'Nicht erfasst'}</div>
          <div class="comp-num">${!c.notVorhanden&&h&&h.gewicht?h.gewicht+'g':''}</div>
          <div class="comp-num">${!c.notVorhanden&&h&&h.preis?'CHF '+h.preis:''}</div>
          ${c.notVorhanden?`<div class="na-badge">n/v</div>`:c.history.length>1?`<div class="hist-badge">${c.history.length}×</div>`:'<div></div>'}
        </div>`;
      }).join('')}
    </div>`;

    <div class="section-header">
      <div class="section-title">Komponenten</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-family:'DM Mono',monospace;font-size:11.5px;color:var(--muted)">Gesamt: <strong style="color:var(--text)">${totalG>0?(totalG/1000).toFixed(3)+' kg':'—'}</strong></span>
        ${editBtn('komponenten')}
      </div>
    </div>
    ${em?`<div class="edit-mode-bar">✏ Felder umbenennen oder löschen. Änderungen gelten für alle Bikes.</div>`:`<p style="font-size:11px;color:var(--muted);margin-bottom:11px">Gruppen und Zeilen per <strong>≡</strong> Drag & Drop sortieren</p>`}
    ${groupsHtml}
    <div class="collapse-header" onclick="const c=document.getElementById('${ztId}');const o=c.style.display!=='none';c.style.display=o?'none':'block';this.querySelector('.collapse-icon').classList.toggle('open',!o)">
      <span class="collapse-icon">▶</span>Zeitstrahl

    <div id="${ztId}" style="display:none">${ztHtml}</div>
  </div>`;
}

        ${settings.map((s,si)=>{return`<div class="field-edit-row">
          <input class="field-edit-input" value="${esc(s.label)}" id="se_${b.settings.indexOf(s)}" onblur="renameSetField('${s.label.replace(/'/g,"\\'")}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">
          <input class="field-edit-unit" value="${esc(s.unit||'')}" placeholder="Einheit" onblur="const si=${b.settings.indexOf(s)};getBike(bikeId).settings[si].unit=this.value;markDirty('Felder')">

      ${settings.map((s,si)=>{const gi2=b.settings.indexOf(s);const h=cur(s.history);
        return`<div class="setting-row" data-dnd-type="setting" data-dnd-idx="${si}">
          <div class="drag-handle" data-dnd-type="setting" data-dnd-idx="${si}" onpointerdown="startDrag(event,'setting',${si},${gi});event.stopPropagation()">${HSVG}</div>

          <div class="setting-val ${!h?'empty':''}" onclick="openSetModal(${gi2})">${h?esc(h.wert)+(s.unit?' '+s.unit:''):'— klicken'}</div>
          <div class="setting-actions">${s.history.length>1?`<span class="hist-badge">${s.history.length}×</span>`:''}<button class="btn btn-ghost btn-sm" onclick="openSetModal(${gi2})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button></div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  return`<div class="section">

  </div>`;
}


function tabGeometrie(b){
  ensureBikeGeo(b);
  const em=editMode==='geometrie';
  const groups={};
  state.geoDefs.forEach(def=>{const g=def.group||'Geometrie';if(!groups[g])groups[g]=[];groups[g].push(def);});
  const gNames=Object.keys(groups);

  const groupsHtml=gNames.map(g=>{
    const defs=groups[g];
    if(em){
      return`<div class="group-card" style="margin-bottom:9px">
        <div class="group-title-row"><div class="group-title-text">${esc(g)}</div></div>
        ${defs.map(def=>`<div class="field-edit-row">
          <input class="field-edit-input" value="${esc(def.label)}" onblur="renameGeoField('${def.id}',this.value,document.getElementById('gu_${def.id}').value)" onkeydown="if(event.key==='Enter')this.blur()">
          <input class="field-edit-unit" id="gu_${def.id}" value="${esc(def.unit||'')}" placeholder="Einheit">
          <button class="btn btn-danger btn-sm" onclick="deleteGeoField('${def.id}')">✕</button>
        </div>`).join('')}
        <div style="padding:8px 12px"><button class="btn btn-secondary btn-sm" onclick="addGeoField()">+ Feld</button></div>
      </div>`;
    }
    return`<div class="group-card" style="margin-bottom:9px">
      <div class="group-title-row"><div class="group-title-text">${esc(g)}</div></div>
      ${defs.map(def=>{
        const geo=b.geometry.find(g=>g.defId===def.id);
        const h=geo?cur(geo.history):null;

        return`<div class="geo-row">
          <div class="drag-handle" style="color:transparent">≡</div>
          <div class="geo-label">${esc(def.label)}${def.unit?` <span style="font-size:9.5px;font-weight:400">(${esc(def.unit)})</span>`:''}</div>
          <div class="geo-val ${!h?'empty':''}" onclick="${gi>=0?`openGeoModal(${gi})`:''}">
            ${h?esc(h.wert)+(def.unit?' '+def.unit:''):'— klicken'}
          </div>
          <div class="setting-actions">${h&&geo.history.length>1?`<span class="hist-badge">${geo.history.length}×</span>`:''}<button class="btn btn-ghost btn-sm" onclick="${gi>=0?`openGeoModal(${gi})`:''}" ><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button></div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  return`<div class="section">
    <div class="section-header">
      <div class="section-title">Geometrie</div>
      ${editBtn('geometrie')}

    ${em?`<div class="edit-mode-bar">✏ Felder umbenennen oder löschen. Änderungen gelten für alle Bikes.</div>`:''}

}

function openGeoModal(gi){
  const b=getBike(bikeId);const geo=b.geometry[gi];if(!geo)return;
  const def=state.geoDefs.find(d=>d.id===geo.defId);if(!def)return;
  const h=cur(geo.history);
  showModal('geo-modal',`
    <div class="modal-header"><div><div class="modal-sub">${esc(def.group||'Geometrie')}</div><div class="modal-title">${esc(def.label)}</div></div><button class="btn btn-ghost btn-sm" onclick="closeModal('geo-modal')">✕</button></div>
    <div class="modal-body">
      <div class="cur-val-box"><div class="cur-val-label">Aktueller Wert</div><div class="cur-val-main ${!h?'empty':''}" style="${h?'font-family:DM Mono,monospace;font-size:24px;font-weight:600':''}">${h?esc(h.wert)+(def.unit?' '+def.unit:''):'Noch nicht erfasst'}</div>${h?`<div class="cur-val-meta">${h.datum?`<span>📅 ${fmtDate(h.datum)}</span>`:''} ${h.notiz?`<span>📝 ${esc(h.notiz)}</span>`:''}</div>`:''}</div>
      <hr class="div" style="margin-top:0">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:11px">Neuen Wert erfassen</div>
      <div class="form-group"><label class="form-label">Datum</label><input class="form-input" type="date" id="gd" value="${today()}"></div>
      <div class="form-group"><label class="form-label">Wert${def.unit?` (${esc(def.unit)})`:''}</label><input class="form-input" id="gw" placeholder="Wert eingeben..."></div>
      <div class="form-group"><label class="form-label">Notiz</label><input class="form-input" id="gn" placeholder="z.B. Low Position, Flip-Chip..."></div>
      ${histSection(geo.history,false)}
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('geo-modal')">Abbrechen</button><button class="btn btn-primary" onclick="saveGeo(${gi})">Speichern</button></div>`);
}
function saveGeo(gi){
  const b=getBike(bikeId);const geo=b.geometry[gi];
  if(!vv('gw').trim()){showToast('Bitte Wert eingeben');return;}
  geo.history.push({datum:vv('gd'),wert:vv('gw'),notiz:vv('gn')});
  const def=state.geoDefs.find(d=>d.id===geo.defId);
  markDirty(def?def.label:'Geometrie');closeModal('geo-modal');switchTab('geometrie');
}

function cmpSnapOptions(bikeId,selDate){
  const b=getBike(bikeId);if(!b)return`<option value="">— aktuell —</option>`;
  const dates=getCmpDates(b);
  return`<option value=""${!selDate?' selected':''}>Aktuell</option>`+
    dates.map(d=>`<option value="${d.date}"${selDate===d.date?' selected':''}>${fmtDate(d.date)} · ${d.summary}</option>`).join('');
}
function getCmpDates(b){
  const dateSet=new Set();
  b.components.forEach(c=>c.history.forEach(h=>{if(h.datum)dateSet.add(h.datum);}));
  b.settings.forEach(s=>s.history.forEach(h=>{if(h.datum)dateSet.add(h.datum);}));
  (b.geometry||[]).forEach(g=>g.history.forEach(h=>{if(h.datum)dateSet.add(h.datum);}));
  const dates=[...dateSet].sort();
  return dates.map((d,i)=>{
    const prev=i>0?dates[i-1]:null;
    const changed=[];
    b.components.forEach(c=>{
      const hN=[...c.history].filter(h=>h.datum<=d);
      const hP=prev?[...c.history].filter(h=>h.datum<=prev):[];
      const vN=hN.length?hN[hN.length-1].wert:'';
      const vP=hP.length?hP[hP.length-1].wert:'';
      if(vN!==vP&&vN)changed.push(c.name);
    });
    b.settings.forEach(s=>{
      const hN=[...s.history].filter(h=>h.datum<=d);
      const hP=prev?[...s.history].filter(h=>h.datum<=prev):[];
      const vN=hN.length?hN[hN.length-1].wert:'';
      const vP=hP.length?hP[hP.length-1].wert:'';
      if(vN!==vP&&vN)changed.push(s.label);
    });
    let summary='';
    if(changed.length===0)summary='Foto/Sonstiges';
    else if(changed.length<=3)summary=changed.join(', ');
    else summary=changed.slice(0,3).join(', ')+` u.a. (${changed.length})`;
    return{date:d,summary};
  }).reverse();
}

function renderCmpTable(){

function stateAtDateForCmp(b,targetDate){
  const cs={},ss={},gs={};
  b.components.forEach(c=>{
    const hist=targetDate?[...c.history].filter(h=>h.datum<=targetDate):[...c.history];
    if(hist.length)cs[c.name]=hist[hist.length-1].wert;
    else if(c.notVorhanden)cs[c.name]='Nicht vorhanden';
  });
  b.settings.forEach(s=>{
    const hist=targetDate?[...s.history].filter(h=>h.datum<=targetDate):[...s.history];
    if(hist.length)ss[s.label]={wert:hist[hist.length-1].wert,unit:s.unit};
  });
  (b.geometry||[]).forEach(g=>{
    const def=state.geoDefs.find(d=>d.id===g.defId);if(!def)return;
    const hist=targetDate?[...g.history].filter(h=>h.datum<=targetDate):[...g.history];
    if(hist.length)gs[def.label]={wert:hist[hist.length-1].wert,unit:def.unit};
  });
  return{cs,ss,gs};
}

function isDiff(...vals){
  const norm=vals.map(v=>(v==null||v==='')?'':String(v));
  return new Set(norm).size>1;
}
function buildCmpTable(){
  const pairs=cmpIds.map((id,i)=>({id,snap:cmpSnaps[i]||null})).filter(p=>p.id);
  if(pairs.length<2)return'';
  const bikes=pairs.map(p=>getBike(p.id));
  const snaps=pairs.map(p=>p.snap);
  const states=bikes.map((b,i)=>stateAtDateForCmp(b,snaps[i]));
  const gridCols='auto '+bikes.map(()=>'1fr').join(' ');

  // Assign color group index per value
  // Returns array of group indices (0-based) per bike, or null if all same
  function colorGroups(vals){
    // normalize empty/null to '' for grouping
    const norm=vals.map(v=>(!v||v==='')?'':v);
    const unique=[...new Set(norm)];
    if(unique.length===1)return null; // all same, no highlight
    // assign group index by order of first appearance
    const map={};let idx=0;
    norm.forEach(v=>{if(map[v]===undefined)map[v]=idx++;});
    return norm.map(v=>map[v]);
  }

  const rows=[],addS=l=>rows.push({s:l}),addR=(l,...vals)=>rows.push({l,vals});

  addS('Allgemein');
  addR('Marke',...bikes.map(b=>b.marke));
  addR('Modell',...bikes.map(b=>b.modell));
  addR('Typ',...bikes.map(b=>b.typ));
  addR('Jahr',...bikes.map(b=>b.jahr));
  addR('Grösse',...bikes.map(b=>b.groesse));
  addR('Federweg',...bikes.map(b=>b.federweg?b.federweg+' mm':''));
  addR('Kaufpreis',...bikes.map(b=>b.preis?'CHF '+b.preis:''));
  addR('Gewicht gewogen',...bikes.map(b=>b.gewichtGewogen?(parseInt(b.gewichtGewogen)/1000).toFixed(2)+' kg':''));

  const orderedGroups=[];
  bikes.forEach(b=>compGroupOrder(b.components).forEach(g=>{if(!orderedGroups.includes(g))orderedGroups.push(g);}));
  orderedGroups.forEach(grp=>{
    const orderedNames=[];
    bikes.forEach(b=>b.components.filter(c=>c.group===grp).forEach(c=>{if(!orderedNames.includes(c.name))orderedNames.push(c.name);}));
    let added=false;
    orderedNames.forEach(name=>{
      const vals=states.map(s=>s.cs[name]||'');
      if(vals.every(v=>!v))return;
      if(!added){addS(grp);added=true;}
      addR(name,...vals);
    });
  });

  const setGroups={};
  bikes.forEach(b=>b.settings.forEach(s=>{
    const g=s.group||'Sonstige';
    if(!setGroups[g])setGroups[g]=[];
    if(!setGroups[g].includes(s.label))setGroups[g].push(s.label);
  }));
  Object.entries(setGroups).forEach(([grp,labels])=>{
    let added=false;
    labels.forEach(label=>{
      const entries=states.map(s=>s.ss[label]);
      const vals=entries.map(e=>e?e.wert:'');
      if(vals.every(v=>!v))return;
      if(!added){addS(grp);added=true;}
      const unit=(entries.find(e=>e&&e.unit)||{}).unit||'';
      addR(label+(unit?` (${unit})`:''),...vals);
    });
  });

  const allGeoLabels=new Set();
  states.forEach(s=>Object.keys(s.gs).forEach(l=>allGeoLabels.add(l)));
  if(allGeoLabels.size){
    addS('Geometrie');
    allGeoLabels.forEach(l=>{
      const entries=states.map(s=>s.gs[l]);
      const vals=entries.map(e=>e?e.wert:'');
      if(vals.every(v=>!v))return;
      const unit=(entries.find(e=>e&&e.unit)||{}).unit||'';
      addR(l+(unit?` (${unit})`:''),...vals);
    });
  }

  const headers=bikes.map((b,i)=>{
    const lbl=esc(b.marke+' '+b.modell.slice(0,20))+(snaps[i]?'<br><span style="font-size:11px;font-weight:400">'+fmtDate(snaps[i])+'</span>':'');
    return`<div class="cmp-cell header">${lbl}</div>`;
  }).join('');

  return`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div class="compare-grid" style="grid-template-columns:${gridCols};width:max(100%, max-content)">
    <div class="cmp-cell row-label">Feld</div>${headers}
    ${rows.map(r=>{
      if(r.s)return`<div class="cmp-section" style="grid-column:1/-1">${esc(r.s)}</div>`;
      const diff=isDiff(...r.vals);
      return`<div class="cmp-cell row-label">${esc(r.l)}</div>`+
        r.vals.map(v=>`<div class="cmp-cell ${diff?'cmp-diff':''}">${v?esc(v):'<span style="color:var(--muted);font-style:italic">—</span>'}</div>`).join('');
    }).join('')}
  </div></div>`;
}

// Collect current kompSnapshot for a setting before saving
function buildKompSnapshot(b,settingLabel){
  const compNames=SETTING_COMP_MAP[settingLabel];
  if(!compNames)return{};
  const snap={};
  compNames.forEach(cn=>{
    const comp=b.components.find(c=>c.name===cn);
    if(!comp||comp.notVorhanden)return;
    const h=cur(comp.history);
    if(h)snap[cn]=h.wert;
  });
  return snap;
}

  const files=Array.from(e.target.files);if(!files.length||!bikeId)return;
  const b=getBike(bikeId);
  // Suggest date of last component/setting change
  const allDates=[];
  b.components.forEach(c=>c.history.forEach(h=>{if(h.datum)allDates.push(h.datum);}));
  b.settings.forEach(s=>s.history.forEach(h=>{if(h.datum)allDates.push(h.datum);}));
  allDates.sort();
  const suggestedDate=allDates.length?allDates[allDates.length-1]:today();
  const datumInput=prompt('Aufnahmedatum des Fotos (JJJJ-MM-TT):',suggestedDate);
  if(datumInput===null)return; // cancelled
  const datum=datumInput.trim()||suggestedDate;
  files.forEach(file=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{
    const c=document.createElement('canvas');let w=img.width,h=img.height,max=1200;
    if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    b.fotos.push({data:c.toDataURL('image/jpeg',.72),datum});
    markDirty('Fotos');if(tab==='info')switchTab('info');
    if(tab==='zeitstrahl')switchTab('zeitstrahl');
  };img.src=ev.target.result;};r.readAsDataURL(file);});e.target.value='';
}
function delPhoto(i){getBike(bikeId).fotos.splice(i,1);markDirty('Fotos');if(tab==='zeitstrahl')switchTab('zeitstrahl');else switchTab('info');}

function buildZeitstrahlHtml(b){
  // Collect all dates with real changes
  const dateMap={}; // date -> {comps:{name->wert}, settings:{label->wert}, foto}
  // Gather all change dates from components
  b.components.forEach(c=>{
    c.history.forEach(h=>{
      if(h.datum&&h.wert){
        if(!dateMap[h.datum])dateMap[h.datum]={label:'',changes:[]};
      }
    });
  });
  b.settings.forEach(s=>{
    s.history.forEach(h=>{
      if(h.datum&&h.wert){
        if(!dateMap[h.datum])dateMap[h.datum]={label:'',changes:[]};
      }
    });
  });
  b.fotos.forEach(f=>{
    const d=typeof f==='string'?null:f.datum;
    if(d&&!dateMap[d])dateMap[d]={label:'',changes:[]};
  });

  const dates=Object.keys(dateMap).sort();
  if(!dates.length)return`<div class="empty-state"><h3>Keine Einträge</h3><p>Erfasse Komponenten mit Datum um den Zeitstrahl zu sehen.</p></div>`;

  // For each date, compute full bike state at that point
  function stateAtDate(targetDate){
    const compState={}, setState={};
    b.components.forEach(c=>{
      const hist=[...c.history].filter(h=>h.datum<=targetDate);
      if(hist.length)compState[c.name]={wert:hist[hist.length-1].wert,gewicht:hist[hist.length-1].gewicht};
    });
    b.settings.forEach(s=>{
      const hist=[...s.history].filter(h=>h.datum<=targetDate);
      if(hist.length)setState[s.label]={wert:hist[hist.length-1].wert,unit:s.unit};
    });
    return{compState,setState};
  }

  function changesAtDate(targetDate, prevDate){
    const curr=stateAtDate(targetDate);
    const prev=prevDate?stateAtDate(prevDate):{compState:{},setState:{}};
    const changes=[];
    Object.entries(curr.compState).forEach(([name,v])=>{
      const pv=prev.compState[name];
      if(!pv||pv.wert!==v.wert)changes.push({type:'comp',name,wert:v.wert,gewicht:v.gewicht});
    });
    Object.entries(curr.setState).forEach(([label,v])=>{
      const pv=prev.setState[label];
      if(!pv||pv.wert!==v.wert)changes.push({type:'set',name:label,wert:v.wert,unit:v.unit});
    });
    return changes;
  }

  // Render snapshots newest first
  const html=dates.slice().reverse().map((d,ri)=>{
    const prevDate=dates[dates.length-1-ri-1]||null;
    const changes=changesAtDate(d,prevDate);
    const foto=lastPhotoForDate(b,d);
    const {compState,setState}=stateAtDate(d);

    // group changes
    const compChanges=changes.filter(c=>c.type==='comp');
    const setChanges=changes.filter(c=>c.type==='set');

    const uid3='z'+Math.random().toString(36).slice(2);

    return`<div style="display:flex;gap:14px;margin-bottom:22px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0">
        <div style="width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px"></div>
        <div style="width:2px;flex:1;background:var(--border);margin-top:4px"></div>
      </div>
      <div style="flex:1;padding-bottom:8px">
        <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:8px">${fmtDate(d)}</div>
        ${foto?`<img src="${foto}" style="width:100%;max-width:320px;height:180px;object-fit:cover;border-radius:8px;margin-bottom:10px;border:1px solid var(--border)">`:'' }
        ${changes.length===0?`<div style="font-size:12px;color:var(--muted);font-style:italic">Foto hinzugefügt</div>`:`
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px">
          ${compChanges.length?`<div style="padding:7px 12px;background:var(--surface2);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Komponenten</div>
          ${compChanges.map(c=>`<div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:baseline">
            <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;min-width:110px;flex-shrink:0">${esc(c.name)}</div>
            <div style="font-size:12.5px;flex:1">${esc(c.wert)}</div>
            ${c.gewicht?`<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${c.gewicht}g</div>`:''}
          </div>`).join('')}`:''}
          ${setChanges.length?`<div style="padding:7px 12px;background:var(--surface2);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Einstellungen</div>
          ${setChanges.map(c=>`<div style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:baseline">
            <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;min-width:110px;flex-shrink:0">${esc(c.name)}</div>
            <div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:600">${esc(c.wert)}${c.unit?' '+c.unit:''}</div>
          </div>`).join('')}`:''}
        </div>`}
        <div class="hist-toggle" onclick="const c=document.getElementById('${uid3}');const o=c.style.display!=='none';c.style.display=o?'none':'block';this.querySelector('.hist-icon').style.transform=o?'rotate(0)':'rotate(90deg)'" style="border-top:none;padding:4px 0">
          <span class="hist-icon">▶</span>Vollständiger Zustand
        </div>
        <div id="${uid3}" style="display:none;padding-top:8px">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden">
            ${Object.entries(compState).map(([name,v])=>`<div style="padding:7px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px">
              <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;min-width:110px;flex-shrink:0">${esc(name)}</div>
              <div style="font-size:12px;flex:1">${esc(v.wert)}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  return html||'<p style="color:var(--muted);font-size:13px;padding:12px 0">Noch keine Einträge mit Datum.</p>';
}


function exportJson(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const filename=`velodb_${new Date().toISOString().split('T')[0]}.json`;
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],filename,{type:'application/json'})]})){
    navigator.share({files:[new File([blob],filename,{type:'application/json'})],title:'VeloDB Backup'}).catch(()=>{});
  }else{
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  }
}
function importJson(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!confirm('Alle Daten werden überschrieben?'))return;state=d;state.bikes.forEach(b=>{b.components.forEach(c=>{if(c.notVorhanden===undefined)c.notVorhanden=false;});b.fotos=b.fotos.map(f=>typeof f==='string'?{data:f,datum:today()}:f);});saveState(false);buildBikeLinks();navigate('overview');showToast('Import ✓');}catch{alert('Ungültige JSON-Datei.');}};r.readAsText(file);e.target.value='';}
function exportCsv(id){
  const b=getBike(id);
  const rows=[['Gruppe','Komponente','Datum','Bezeichnung','Gewicht (g)','Preis (CHF)','Notiz']];
  b.components.forEach(c=>{if(!c.notVorhanden)c.history.forEach(h=>rows.push([c.group,c.name,h.datum,h.wert,h.gewicht,h.preis,h.notiz]));});
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${b.marke}_${b.modell}.csv`.replace(/[\s\/]+/g,'_');a.click();
}
function attachListeners(){
  document.querySelectorAll('[data-field]').forEach(el=>{
    el.addEventListener('input',()=>{const b=getBike(bikeId);if(!b)return;b[el.dataset.field]=el.value;markDirty(el.dataset.label||el.dataset.field);});
  });
}
buildBikeLinks();
navigate('overview');
</script>
